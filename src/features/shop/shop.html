<!-- SHOP PAGE -->
<div id="pg-shop" class="spage">
  <div class="pg-title"><h1>SHOP</h1><p>Spend your gems on exclusive cosmetics</p></div>
  <div class="mkt-tabs">
    <button class="mkttab on" data-scope="shop" data-tab="balls" data-action="set-catalog-tab">BALL COLORS</button>
    <button class="mkttab" data-scope="shop" data-tab="bgs" data-action="set-catalog-tab">BACKGROUNDS</button>
    <button class="mkttab" data-scope="shop" data-tab="trails" data-action="set-catalog-tab">SHOT TRAILS</button>
    <button class="mkttab" data-scope="shop" data-tab="fx" data-action="set-catalog-tab">HIT EFFECTS</button>
    <button class="mkttab" data-scope="shop" data-tab="titles" data-action="set-catalog-tab">TITLES</button>
  </div>
  <div class="mkt-sec act" data-scope="shop" id="shop-balls"><div class="mkt-grid" id="shop-grid-balls"></div></div>
  <div class="mkt-sec" data-scope="shop" id="shop-bgs"><div class="mkt-grid" id="shop-grid-bgs"></div></div>
  <div class="mkt-sec" data-scope="shop" id="shop-trails"><div class="mkt-grid" id="shop-grid-trails"></div></div>
  <div class="mkt-sec" data-scope="shop" id="shop-fx"><div class="mkt-grid" id="shop-grid-fx"></div></div>
  <div class="mkt-sec" data-scope="shop" id="shop-titles"><div class="mkt-grid" id="shop-grid-titles"></div></div>
</div>
