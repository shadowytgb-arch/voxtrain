<!-- UPDATES PAGE -->
<div id="pg-updates" class="spage">
  <div style="padding:40px;max-width:1100px;margin:0 auto;">
    <div class="pg-title"><h1>UPDATES</h1><p>See what's new in VoxTrain.</p></div>
    <div style="margin-bottom:20px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,0.03);max-width:360px;">
      <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Temporary Testing</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input id="updates-gems-input" type="number" min="0" step="1" inputmode="numeric" placeholder="Set gems" style="flex:1;">
        <button class="fr-btn primary" data-action="set-test-gems">SET</button>
      </div>
    </div>
    <div class="updates-section">
      <h3>Latest Updates</h3>
      <div id="updates-list"></div>
      <h3 style="margin-top:24px;">Legacy</h3>
      <div id="legacy-updates-list"></div>
    </div>
  </div>
</div>
