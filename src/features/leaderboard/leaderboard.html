<!-- LEADERBOARD PAGE -->
<div id="pg-lb" class="spage">
  <div class="pg-title"><h1>LEADERBOARD</h1><p>Local rankings per training mode</p></div>
  <div class="lb-tabs" id="lb-mode-tabs">
    <button class="lbtab on" data-action="set-lb-mode" data-lb-mode="trainer3d">3D</button>
    <button class="lbtab" data-action="set-lb-mode" data-lb-mode="flick">FLICK</button>
    <button class="lbtab" data-action="set-lb-mode" data-lb-mode="tracking">TRACK</button>
    <button class="lbtab" data-action="set-lb-mode" data-lb-mode="switching">SWITCH</button>
    <button class="lbtab" data-action="set-lb-mode" data-lb-mode="micro">MICRO</button>
    <button class="lbtab" data-action="set-lb-mode" data-lb-mode="mixed">MIXED</button>
  </div>
  <div class="lb-time-tabs">
    <button class="lttab on" data-action="set-lb-time" data-lb-time="daily">DAILY</button>
    <button class="lttab" data-action="set-lb-time" data-lb-time="weekly">WEEKLY</button>
    <button class="lttab" data-action="set-lb-time" data-lb-time="alltime">ALL TIME</button>
  </div>
  <div id="lb-reset-timer" style="color:var(--muted);font-size:14px;text-align:center;margin-bottom:12px;">Next reset in —</div>
  <div class="lb-wrap">
    <div class="lb-your-rank" id="lb-your-rank" style="display:none;">
      <div class="rank-num" id="lb-yr-rank">#—</div>
      <div style="flex:1;">
        <div style="font-weight:700;" id="lb-yr-name">You</div>
        <div style="font-size:12px;color:var(--muted);" id="lb-yr-score">Score: —</div>
      </div>
      <div id="lb-yr-grade" style="font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;"></div>
    </div>
    <div class="lb-list" id="lb-list"></div>
  </div>
</div>
